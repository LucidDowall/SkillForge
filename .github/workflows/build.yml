name: Build SkillForge

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.8"
          cache-disabled: true   # 캐시 경고/잠재 문제 제거(안정성 우선)

      # ShadowJar가 있는 프로젝트라면 shadowJar, 아니면 build로 바꿔도 됨
      - name: Build
        run: |
          gradle --no-daemon --stacktrace clean shadowJar

      - name: Upload JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SkillForge-JAR
          path: |
            **/build/libs/*.jar
            **/build/shadow/*.jar
