name: Build SkillForge

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.8"
          cache-disabled: true   # 캐시 경고/잠재 문제 제거(안정성 우선)

      # ShadowJar가 있는 프로젝트라면 shadowJar, 아니면 build로 바꿔도 됨
      - name: Build (capture log)
        run: |
          set -euxo pipefail
          mkdir -p build-logs
          gradle --no-daemon --console=plain --warning-mode all --stacktrace --info clean shadowJar 2>&1 | tee build-logs/gradle.log

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build-logs/gradle.log
